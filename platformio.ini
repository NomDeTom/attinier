; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATtiny816]
platform = atmelmegaavr
board = ATtiny816
framework = arduino
upload_protocol = serialupdi
upload_speed = 57600
build_flags = -Dattiny816 -DINA3221_EMULATOR -DBQ25798_USE_SOFT_I2C
lib_deps = felias-fogg/SlowSoftI2CMaster
board_build.f_cpu = 4000000L

; Set the correct COM port for your USB-to-UPDI adapter.
; upload_port = COM4

[env:ATtiny1616]
platform = atmelmegaavr
board = ATtiny1616
framework = arduino
upload_protocol = serialupdi
upload_speed = 57600
build_flags = -DINA3221_EMULATOR -DBQ25798_USE_SOFT_I2C
lib_deps = felias-fogg/SlowSoftI2CMaster
board_build.f_cpu = 4000000L

; Set the correct COM port for your USB-to-UPDI adapter.
; upload_port = COM4